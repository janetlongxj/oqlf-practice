site_name: OQLF practice
site_description: Bilingual EN/FR practice notes for OQLF case studies, French writing, and other resources.
site_url: https://janetlongxj.github.io/oqlf-practice/
repo_name: janetlongxj/oqlf-practice
repo_url: https://github.com/janetlongxj/oqlf-practice

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: white
      accent: blue grey
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home / Accueil: index.md
  - Case / Cas: 
      - case 1: case/electricity-import.md
      - case 2: case/workplace-accident.md
      - case 3: case/nuclear-decommissioning.md
      - case 4: case/oil-drilling.md
      - case 5: case/footbridge-feasibility.md
      - case 6: case/champlain-bridge.md
  - French / Français:
      - Overview: french/index.md
      - Writing Frameworks / Cadres d’écrit: french/writing-frameworks.md
  - Other / Autres:
      - Overview: other/index.md
      - Miscellaneous Prompts / Notes diverses: other/misc-notes.md
